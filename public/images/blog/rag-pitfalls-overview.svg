<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none" font-family="'Space Grotesk', 'Inter', sans-serif">
  <rect width="800" height="500" rx="12" fill="#141414" stroke="#2A2A2A" stroke-width="1"/>
  <text x="400" y="40" text-anchor="middle" fill="#F5F5F5" font-size="18" font-weight="600">The 6 Pitfalls of RAG Systems</text>
  <g transform="translate(60, 80)">
    <circle cx="20" cy="20" r="16" fill="#FF6B6B" opacity="0.2"/>
    <text x="20" y="25" text-anchor="middle" fill="#FF6B6B" font-size="14" font-weight="600">1</text>
    <text x="50" y="18" fill="#F5F5F5" font-size="14" font-weight="500">Naive Chunking</text>
    <text x="50" y="36" fill="#A0A0A0" font-size="11">Fixed-size splits destroy context</text>
    <rect x="200" y="8" width="80" height="24" rx="4" fill="#1E1E1E" stroke="#FF6B6B" stroke-width="1"/>
    <text x="240" y="24" text-anchor="middle" fill="#FF6B6B" font-size="10">Pitfall</text>
    <rect x="290" y="8" width="100" height="24" rx="4" fill="#1E1E1E" stroke="#5BA4CF" stroke-width="1"/>
    <text x="340" y="24" text-anchor="middle" fill="#5BA4CF" font-size="10">Semantic chunks</text>
  </g>
  <g transform="translate(60, 140)">
    <circle cx="20" cy="20" r="16" fill="#FF6B6B" opacity="0.2"/>
    <text x="20" y="25" text-anchor="middle" fill="#FF6B6B" font-size="14" font-weight="600">2</text>
    <text x="50" y="18" fill="#F5F5F5" font-size="14" font-weight="500">Irrelevant Retrieval</text>
    <text x="50" y="36" fill="#A0A0A0" font-size="11">Cosine similarity does not equal relevance</text>
    <rect x="200" y="8" width="80" height="24" rx="4" fill="#1E1E1E" stroke="#FF6B6B" stroke-width="1"/>
    <text x="240" y="24" text-anchor="middle" fill="#FF6B6B" font-size="10">Pitfall</text>
    <rect x="290" y="8" width="120" height="24" rx="4" fill="#1E1E1E" stroke="#5BA4CF" stroke-width="1"/>
    <text x="350" y="24" text-anchor="middle" fill="#5BA4CF" font-size="10">Hybrid and Rerank</text>
  </g>
  <g transform="translate(60, 200)">
    <circle cx="20" cy="20" r="16" fill="#FF6B6B" opacity="0.2"/>
    <text x="20" y="25" text-anchor="middle" fill="#FF6B6B" font-size="14" font-weight="600">3</text>
    <text x="50" y="18" fill="#F5F5F5" font-size="14" font-weight="500">Overloaded Prompt</text>
    <text x="50" y="36" fill="#A0A0A0" font-size="11">Too many chunks confuse the LLM</text>
    <rect x="200" y="8" width="80" height="24" rx="4" fill="#1E1E1E" stroke="#FF6B6B" stroke-width="1"/>
    <text x="240" y="24" text-anchor="middle" fill="#FF6B6B" font-size="10">Pitfall</text>
    <rect x="290" y="8" width="120" height="24" rx="4" fill="#1E1E1E" stroke="#5BA4CF" stroke-width="1"/>
    <text x="350" y="24" text-anchor="middle" fill="#5BA4CF" font-size="10">Context filtering</text>
  </g>
  <g transform="translate(60, 260)">
    <circle cx="20" cy="20" r="16" fill="#FF6B6B" opacity="0.2"/>
    <text x="20" y="25" text-anchor="middle" fill="#FF6B6B" font-size="14" font-weight="600">4</text>
    <text x="50" y="18" fill="#F5F5F5" font-size="14" font-weight="500">No Hallucination Guards</text>
    <text x="50" y="36" fill="#A0A0A0" font-size="11">Model makes up answers</text>
    <rect x="200" y="8" width="80" height="24" rx="4" fill="#1E1E1E" stroke="#FF6B6B" stroke-width="1"/>
    <text x="240" y="24" text-anchor="middle" fill="#FF6B6B" font-size="10">Pitfall</text>
    <rect x="290" y="8" width="120" height="24" rx="4" fill="#1E1E1E" stroke="#5BA4CF" stroke-width="1"/>
    <text x="350" y="24" text-anchor="middle" fill="#5BA4CF" font-size="10">Confidence scoring</text>
  </g>
  <g transform="translate(60, 320)">
    <circle cx="20" cy="20" r="16" fill="#FF6B6B" opacity="0.2"/>
    <text x="20" y="25" text-anchor="middle" fill="#FF6B6B" font-size="14" font-weight="600">5</text>
    <text x="50" y="18" fill="#F5F5F5" font-size="14" font-weight="500">No Evaluation Loop</text>
    <text x="50" y="36" fill="#A0A0A0" font-size="11">Building without measuring quality</text>
    <rect x="200" y="8" width="80" height="24" rx="4" fill="#1E1E1E" stroke="#FF6B6B" stroke-width="1"/>
    <text x="240" y="24" text-anchor="middle" fill="#FF6B6B" font-size="10">Pitfall</text>
    <rect x="290" y="8" width="100" height="24" rx="4" fill="#1E1E1E" stroke="#5BA4CF" stroke-width="1"/>
    <text x="340" y="24" text-anchor="middle" fill="#5BA4CF" font-size="10">RAGAS metrics</text>
  </g>
  <g transform="translate(60, 380)">
    <circle cx="20" cy="20" r="16" fill="#FF6B6B" opacity="0.2"/>
    <text x="20" y="25" text-anchor="middle" fill="#FF6B6B" font-size="14" font-weight="600">6</text>
    <text x="50" y="18" fill="#F5F5F5" font-size="14" font-weight="500">Ignoring User Experience</text>
    <text x="50" y="36" fill="#A0A0A0" font-size="11">Users cannot tell if it is reliable</text>
    <rect x="200" y="8" width="80" height="24" rx="4" fill="#1E1E1E" stroke="#FF6B6B" stroke-width="1"/>
    <text x="240" y="24" text-anchor="middle" fill="#FF6B6B" font-size="10">Pitfall</text>
    <rect x="290" y="8" width="120" height="24" rx="4" fill="#1E1E1E" stroke="#5BA4CF" stroke-width="1"/>
    <text x="350" y="24" text-anchor="middle" fill="#5BA4CF" font-size="10">Source citations</text>
  </g>
  <line x1="440" y1="90" x2="440" y2="420" stroke="#2A2A2A" stroke-width="1" stroke-dasharray="4 4"/>
  <g transform="translate(480, 100)">
    <text x="0" y="0" fill="#F5F5F5" font-size="13" font-weight="500">The RAG Pipeline</text>
    <rect x="0" y="20" width="260" height="40" rx="6" fill="#1E1E1E" stroke="#5BA4CF" stroke-width="1"/>
    <text x="130" y="45" text-anchor="middle" fill="#5BA4CF" font-size="12" font-weight="500">1. User Query</text>
    <line x1="130" y1="60" x2="130" y2="80" stroke="#5BA4CF" stroke-width="1.5"/>
    <rect x="0" y="80" width="260" height="40" rx="6" fill="#1E1E1E" stroke="#5BA4CF" stroke-width="1"/>
    <text x="130" y="105" text-anchor="middle" fill="#5BA4CF" font-size="12" font-weight="500">2. Chunk and Embed</text>
    <line x1="130" y1="120" x2="130" y2="140" stroke="#5BA4CF" stroke-width="1.5"/>
    <rect x="0" y="140" width="260" height="40" rx="6" fill="#1E1E1E" stroke="#5BA4CF" stroke-width="1"/>
    <text x="130" y="165" text-anchor="middle" fill="#5BA4CF" font-size="12" font-weight="500">3. Retrieve Top-K</text>
    <line x1="130" y1="180" x2="130" y2="200" stroke="#5BA4CF" stroke-width="1.5"/>
    <rect x="0" y="200" width="260" height="40" rx="6" fill="#1E1E1E" stroke="#5BA4CF" stroke-width="1"/>
    <text x="130" y="225" text-anchor="middle" fill="#5BA4CF" font-size="12" font-weight="500">4. Generate Answer</text>
    <line x1="130" y1="240" x2="130" y2="260" stroke="#5BA4CF" stroke-width="1.5"/>
    <rect x="0" y="260" width="260" height="40" rx="6" fill="#1E1E1E" stroke="#5BA4CF" stroke-width="1"/>
    <text x="130" y="285" text-anchor="middle" fill="#5BA4CF" font-size="12" font-weight="500">5. Return to User</text>
    <text x="0" y="330" fill="#666666" font-size="11">Each step has pitfalls that</text>
    <text x="0" y="348" fill="#666666" font-size="11">compound into bad results.</text>
  </g>
</svg>
