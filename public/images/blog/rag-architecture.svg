<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" fill="none" font-family="'Space Grotesk', 'Inter', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#141414"/>
      <stop offset="1" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#5BA4CF"/>
      <stop offset="1" stop-color="#3D7A9E"/>
    </linearGradient>
  </defs>

  <rect width="800" height="420" rx="12" fill="url(#bg)" stroke="#2A2A2A" stroke-width="1"/>

  <text x="400" y="40" text-anchor="middle" fill="#F5F5F5" font-size="18" font-weight="600">BantuAI Architecture</text>
  <text x="400" y="60" text-anchor="middle" fill="#666666" font-size="12">WhatsApp RAG Chatbot for Customer Support</text>

  <rect x="40" y="100" width="140" height="60" rx="8" fill="#1E1E1E" stroke="#2A2A2A" stroke-width="1"/>
  <text x="110" y="125" text-anchor="middle" fill="#F5F5F5" font-size="13" font-weight="500">WhatsApp User</text>
  <text x="110" y="145" text-anchor="middle" fill="#A0A0A0" font-size="11">via WAHA API</text>

  <rect x="40" y="200" width="140" height="60" rx="8" fill="#1E1E1E" stroke="#2A2A2A" stroke-width="1"/>
  <text x="110" y="225" text-anchor="middle" fill="#F5F5F5" font-size="13" font-weight="500">n8n Workflow</text>
  <text x="110" y="245" text-anchor="middle" fill="#A0A0A0" font-size="11">Orchestration</text>

  <rect x="40" y="300" width="140" height="60" rx="8" fill="#1E1E1E" stroke="#2A2A2A" stroke-width="1"/>
  <text x="110" y="325" text-anchor="middle" fill="#F5F5F5" font-size="13" font-weight="500">Response</text>
  <text x="110" y="345" text-anchor="middle" fill="#A0A0A0" font-size="11">Back to User</text>

  <rect x="280" y="160" width="160" height="80" rx="8" fill="#1E1E1E" stroke="#5BA4CF" stroke-width="1.5"/>
  <text x="360" y="190" text-anchor="middle" fill="#5BA4CF" font-size="14" font-weight="600">Query Processing</text>
  <text x="360" y="210" text-anchor="middle" fill="#A0A0A0" font-size="11">Embedding + Retrieval</text>
  <text x="360" y="228" text-anchor="middle" fill="#A0A0A0" font-size="11">+ Reranking</text>

  <rect x="540" y="100" width="200" height="80" rx="8" fill="#1E1E1E" stroke="#2A2A2A" stroke-width="1"/>
  <text x="640" y="130" text-anchor="middle" fill="#F5F5F5" font-size="14" font-weight="500">Supabase (pgvector)</text>
  <text x="640" y="150" text-anchor="middle" fill="#A0A0A0" font-size="11">Product docs, FAQs, policies</text>
  <text x="640" y="168" text-anchor="middle" fill="#A0A0A0" font-size="11">Vector embeddings stored</text>

  <rect x="540" y="220" width="200" height="80" rx="8" fill="#1E1E1E" stroke="#2A2A2A" stroke-width="1"/>
  <text x="640" y="250" text-anchor="middle" fill="#F5F5F5" font-size="14" font-weight="500">OpenAI API</text>
  <text x="640" y="270" text-anchor="middle" fill="#A0A0A0" font-size="11">LLM generates answer</text>
  <text x="640" y="288" text-anchor="middle" fill="#A0A0A0" font-size="11">with retrieved context</text>

  <rect x="280" y="300" width="160" height="60" rx="8" fill="#1E1E1E" stroke="#2A2A2A" stroke-width="1"/>
  <text x="360" y="325" text-anchor="middle" fill="#F5F5F5" font-size="13" font-weight="500">Guardrails</text>
  <text x="360" y="345" text-anchor="middle" fill="#A0A0A0" font-size="11">Confidence check + fallback</text>

  <path d="M180 130 L280 130 L280 190" stroke="#5BA4CF" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M180 230 L280 230" stroke="#5BA4CF" stroke-width="1.5" fill="none"/>
  <path d="M440 200 L540 140" stroke="#5BA4CF" stroke-width="1.5" fill="none"/>
  <path d="M640 180 L640 220" stroke="#5BA4CF" stroke-width="1.5" fill="none" stroke-dasharray="4 3"/>
  <path d="M540 260 L440 260 L440 240" stroke="#5BA4CF" stroke-width="1.5" fill="none"/>
  <path d="M360 300 L360 240" stroke="#5BA4CF" stroke-width="1.5" fill="none"/>
  <path d="M180 330 L280 330" stroke="#5BA4CF" stroke-width="1.5" fill="none"/>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5BA4CF"/>
    </marker>
  </defs>

  <text x="230" y="120" fill="#666666" font-size="10">1. Message</text>
  <text x="230" y="220" fill="#666666" font-size="10">5. Response</text>
  <text x="480" y="160" fill="#666666" font-size="10">2. Retrieve</text>
  <text x="655" y="210" fill="#666666" font-size="10">3. Generate</text>
  <text x="480" y="250" fill="#666666" font-size="10">4. Check</text>
</svg>
